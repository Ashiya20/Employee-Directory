<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Directory</title>

  <link rel="stylesheet" href="style.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>

<body>
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">X</div>
      <h2>XYZ Company</h2>
    </div>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Employees</a></li>
      <li><a href="#">Departments</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>Employee Directory</h1>
      <p>Discover, manage and connect with employees across organization.</p>
    </div>
  </header>

  <main>
    <div class="search-filter">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search" placeholder="Search by name or role..." />
      </div>

      <select id="departmentFilter">
        <option value="">All Departments</option>
        <option value="Engineering">Engineering</option>
        <option value="Design">Design</option>
        <option value="Marketing">Marketing</option>
        <option value="Sales">Sales</option>
        <option value="HR">HR</option>
      </select>
    </div>

    <div id="employeeGrid" class="employee-grid"></div>

    <p id="noResults">No employees found.</p>
  </main>

  <button id="addBtn">+</button>

  <div id="modal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Add Employee</h2>
        <button id="closeBtn">×</button>
      </div>

      <form id="employeeForm">
        <label>Name</label>
        <input type="text" id="name" required />

        <label>Role</label>
        <input type="text" id="role" required />

        <label>Department</label>
        <select id="department" required>
          <option value="">Select Department</option>
          <option value="Engineering">Engineering</option>
          <option value="Design">Design</option>
          <option value="Marketing">Marketing</option>
          <option value="Sales">Sales</option>
          <option value="HR">HR</option>
        </select>

        <label>Email</label>
        <input type="email" id="email" required />

        <label>Status</label>
        <select id="status" required>
          <option value="Available">Available</option>
          <option value="Busy">Busy</option>
          <option value="On Call">On Call</option>
          <option value="Offline">Offline</option>
        </select>

        <label>Avatar Color</label>
        <input type="color" id="color" value="#6366f1" />

        <div class="form-buttons">
          <button type="button" id="cancelBtn">Cancel</button>
          <button type="submit">Add Employee</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
